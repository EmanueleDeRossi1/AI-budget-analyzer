services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  test:
    build: ./backend
    entrypoint: ""
    command: >
      sh -c "pip install -r /tests/requirements-test.txt -q &&
             pytest /tests -v"
    environment:
      DJANGO_SETTINGS_MODULE: budget_analyst.settings
      DJANGO_SECRET_KEY: test-secret-key
      DATABASE_URL: sqlite:////tmp/test.db
      DJANGO_DEBUG: "True"
    volumes:
      - ./backend:/app
      - ./tests:/tests

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
